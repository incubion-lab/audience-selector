<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ご案内</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 48px 20px;
      background: #ffffff;
      color: #333333;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
    }
    p {
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .btn {
      display: block;
      margin: 16px 0;
      padding: 16px 20px;
      border: 1px solid #cccccc;
      border-radius: 10px;
      text-decoration: none;
      color: #333333;
      font-weight: 600;
    }
    .btn:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>当てはまる方をお選びください</h1>

    <a class="btn" href="https://example.com/page-a">属性Aの方はこちら</a>
    <a class="btn" href="https://example.com/page-b">属性Bの方はこちら</a>
  </div>
</body>
</html>
