<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audience-selector</title>

  <!-- Archivo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #333333;
      font-family: "Archivo", -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    }

    .hero {
      background: #2b3bc1;
      color: #ffffff;
      padding: 20px 20px 48px;
    }

    .hero-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 32px;
    }

    .logo-wrap img {
      height: 44px;
      width: auto;
      display: block;
    }

    .hero-text {
      text-align: center;
    }

    .hero-text h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.3;
      font-weight: 700;
      color: #ffffff;
    }

    .hero-text p {
      margin: 0;
      font-size: 16px;
      line-height: 1.7;
      color: #ffffff;
      opacity: 0.96;
    }

    .container {
      max-width: 720px;
      margin: -18px auto 0;
      padding: 0 20px 56px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7ef;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      padding: 32px 24px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: #333333;
    }

    .section-text {
      margin: 0 0 24px;
      text-align: center;
      font-size: 15px;
      line-height: 1.7;
      color: #333333;
    }

    .btn {
      display: block;
      margin: 14px 0;
      padding: 18px 20px;
      border-radius: 14px;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-primary {
      background: #2b3bc1;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(43, 59, 193, 0.18);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      background: #2433aa;
    }

    .btn-secondary {
      background: #ffffff;
      color: #2b3bc1;
      border: 2px solid #2b3bc1;
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
      background: #f6f8ff;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
      color: #333333;
      opacity: 0.75;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 16px 16px 40px;
      }

      .logo-wrap {
        margin-bottom: 24px;
      }

      .logo-wrap img {
        height: 36px;
      }

      .hero-text h1 {
        font-size: 26px;
      }

      .hero-text p {
        font-size: 15px;
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="logo-wrap">
        <img src="logo.svg" alt="RobotATTA!">
      </div>

      <div class="hero-text">
        <h1>About RobotATTA! | ロボットあった！とは</h1>
        <p>ご関心に応じた説明ページへご案内します。</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2 class="section-title">ご案内ページ</h2>
      <p class="section-text">
        該当する項目を選ぶと、それぞれの説明ページに移動します。
      </p>

      <a class="btn btn-primary" href="https://example.com/page-a">属性Aの方はこちら</a>
      <a class="btn btn-secondary" href="https://example.com/page-b">属性Bの方はこちら</a>

      <p class="note">
        各ボタンから該当する説明ページへ移動します。
      </p>
    </section>
  </main>
</body>
</html>
