<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ご案内</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #333333;
      font-family: "Archivo", -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 64px;
    }

    .logo-wrap {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 56px;
    }

    .logo-wrap img {
      height: 44px;
      width: auto;
      display: block;
    }

    .content {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
      color: #333333;
    }

    .lead {
      margin: 0 0 32px;
      font-size: 16px;
      line-height: 1.8;
      color: #333333;
    }

    .btn {
      display: block;
      margin: 14px 0;
      padding: 18px 20px;
      border-radius: 14px;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .btn-primary {
      background: #2b3bc1;
      color: #ffffff;
      border: 2px solid #2b3bc1;
    }

    .btn-primary:hover {
      background: #2433aa;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #ffffff;
      color: #2b3bc1;
      border: 2px solid #2b3bc1;
    }

    .btn-secondary:hover {
      background: #f6f8ff;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.7;
      color: #333333;
      opacity: 0.72;
    }

    @media (max-width: 640px) {
      .page {
        padding: 20px 16px 48px;
      }

      .logo-wrap {
        margin-bottom: 40px;
      }

      .logo-wrap img {
        height: 36px;
      }

      h1 {
        font-size: 26px;
      }

      .lead {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-wrap">
      <img src="logo.svg" alt="RobotATTA!">
    </div>

    <main class="content">
      <h1>About RobotATTA!</h1>
      <p class="lead">
        ご関心に応じた説明ページへご案内します。
      </p>

      <a class="btn btn-primary" href="https://example.com/page-a">Looking for Robot Information? / ロボット情報をお探しの方</a>
      <a class="btn btn-secondary" href="https://incubion.com/robotatta/">In the Robot Business? / ロボット関連事業者の方</a>

      <p class="note">
        <a href="#" onclick="history.back(); return false;">Back 戻る</a>
      </p>
    </main>
  </div>
</body>
</html>
